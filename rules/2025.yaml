# rules/2025.yaml
# Valori anno fiscale 2025 — fonti:
#   - Istruzioni per la compilazione della dichiarazione d'imposta 2025 PF, Canton Ticino (pag. 50)
#   - Tabella di confronto IC/IFD (Tabella_deduzioni_PF_2025.pdf, sez. 9)

version: "2025"

authority_reference:
  cantonal: "Art. 25 LT (stato 2025) — tassi auto CHF 0.60/km confermati da Istruzioni PF 2025"
  federal:  "RS 642.118.1 (stato 2025) — auto CHF 0.70/km, cap CHF 3'300 (Istruzioni PF 2025 pag. 50)"

# ─── CANTON TICINO (Art. 25 LT) ──────────────────────────────────────────────
cantonal_TI:
  transport:
    public_transport:
      mode: actual_cost
      cap_chf: null

    private_car:
      rate_chf_per_km: 0.60         # CONFERMATO: Istruzioni PF 2025, tabella IC/IFD, pag. 50
      condition: no_adequate_public_transport
      cap_chf: null                  # nessun tetto cantonale

    bicycle:
      flat_rate_chf_per_year: 700    # max CHF 700 o costo MP se inferiore

    motorcycle_white_plate:
      rate_chf_per_km: 0.40          # motocicletta targa bianca (allineato a IFD RS 642.118.1 Appendice)

  meals:
    without_cafeteria:
      rate_chf_per_day: 15.00        # doppia economia domestica, 1 pasto
      annual_max_chf: 3200
    with_cafeteria:
      rate_chf_per_day: 7.50         # con mensa / contributo datore di lavoro, 1 pasto
      annual_max_chf: 1600
    shift_work:
      rate_chf_per_day: 15.00        # lavori a turni — stessa tariffa senza mensa
      annual_max_chf: 3200           # CONFERMATO: Tabella_deduzioni_PF_2025.pdf sez. 9
    weekly_resident:
      rate_chf_per_day: 30.00        # rientro settimanale, 2 pasti
      annual_max_chf: 6400
    weekly_resident_with_cafeteria:
      rate_chf_per_day: 22.50        # rientro settimanale con mensa, 2 pasti
      annual_max_chf: 4800
    weekly_resident_accommodation:
      mode: actual_cost              # alloggio residente settimanale: costo effettivo 1 camera
      cap_chf: null                  # CONFERMATO: Tabella_deduzioni_PF_2025.pdf sez. 9

  other_expenses:
    method: flat_rate
    flat_rate_chf: 3000              # CONFERMATO: Tabella_deduzioni_PF_2025.pdf sez. 9
    flat_rate_part_time_chf: 1500   # lavoro <50% o <6 mesi/anno — CONFERMATO: Tabella_deduzioni_PF_2025.pdf sez. 9
    secondary_activity:              # spese per attività accessoria dipendente
      flat_rate_chf: 800             # CONFERMATO: Tabella_deduzioni_PF_2025.pdf sez. 9
      method: flat_rate_or_actual    # 800 CHF o spese effettive se superiori

  public_transport_subscriptions:   # FONTE: flyer ARCOBALENO "Piano zone e tariffe", dicembre 2025, valido dal 14.12.2025
    arcobaleno_annual_adult_2cl:    # Adulti >=25 anni, 2a classe
      zones_1: 485
      zones_2: 732
      zones_3: 1074
      zones_4: 1387
      zones_5: 1691
      zones_6: 1986
      zones_7: 2157
      zones_8_plus: 2252
    arcobaleno_annual_adult_1cl:    # Adulti >=25 anni, 1a classe
      zones_1: 827
      zones_2: 1245
      zones_3: 1834
      zones_4: 2366
      zones_5: 2879
      zones_6: 3382
      zones_7: 3667
      zones_8_plus: 3829

  flat_rate_all_expenses_chf: null   # forfait globale 2025 — non previsto (solo dal 2026, Art. 25 cpv. 2 LT)

# ─── IMPOSTA FEDERALE DIRETTA (Art. 26 LIFD) ─────────────────────────────────
federal_IFD:
  transport:
    public_transport:
      mode: actual_cost
      cap_chf: null

    private_car:
      rate_chf_per_km: 0.70         # CONFERMATO: Istruzioni PF 2025, tabella IC/IFD, pag. 50
      cap_chf: 3300                  # CONFERMATO: Istruzioni PF 2025, tabella IC/IFD (max 3'300)

    bicycle:
      flat_rate_chf_per_year: 700

    motorcycle_white_plate:
      rate_chf_per_km: 0.40         # CONFERMATO: Istruzioni PF 2025, tabella IC/IFD

  meals:
    without_cafeteria:
      rate_chf_per_day: 15.00        # doppia economia domestica, 1 pasto
      annual_max_chf: 3200
    with_cafeteria:
      rate_chf_per_day: 7.50         # con mensa / contributo datore di lavoro, 1 pasto
      annual_max_chf: 1600
    shift_work:
      rate_chf_per_day: 15.00        # lavori a turni — stessa tariffa senza mensa
      annual_max_chf: 3200           # CONFERMATO: Tabella_deduzioni_PF_2025.pdf sez. 9
    weekly_resident:
      rate_chf_per_day: 30.00        # rientro settimanale, 2 pasti
      annual_max_chf: 6400
    weekly_resident_with_cafeteria:
      rate_chf_per_day: 22.50        # rientro settimanale con mensa, 2 pasti
      annual_max_chf: 4800
    weekly_resident_accommodation:
      mode: actual_cost              # alloggio residente settimanale: costo effettivo 1 camera
      cap_chf: null                  # CONFERMATO: Tabella_deduzioni_PF_2025.pdf sez. 9

  other_expenses:
    method: percentage_of_net_salary
    rate_percent: 3.0                # CONFERMATO: Tabella_deduzioni_PF_2025.pdf sez. 9
    minimum_chf: 2000
    maximum_chf: 4000
    part_time:                       # lavoro <50% o <6 mesi/anno — stessa formula (min/max invariati)
      rate_percent: 3.0
      minimum_chf: 2000
      maximum_chf: 4000
    secondary_activity:              # spese per attività accessoria dipendente
      method: percentage_of_net_salary  # CONFERMATO: Tabella_deduzioni_PF_2025.pdf sez. 9
      rate_percent: 20.0
      minimum_chf: 800
      maximum_chf: 2400

# ─── GIORNI LAVORATIVI ───────────────────────────────────────────────────────
working_days:
  standard_annual: 220              # CONFERMATO: Istruzioni PF 2025, pag. 24

geocoding:
  road_correction_factor: 1.25
