# rules/2026.yaml
# FONTE UNICA DI VERITÀ per tutti i valori CHF dell'anno fiscale 2026.
# Nessun importo CHF va nel codice Python — solo qui.
# Aggiornare questo file quando cambiano le regole fiscali.

version: "2026"

authority_reference:
  cantonal: >
    Art. 25 LT (stato 1.1.2026, RS-TI 640.100).
    Art. 25 cpv. 2 LT modificato da iniziativa parlamentare votata il 10.06.2026:
    forfait CHF 3'500 fissato direttamente nella legge (non più delega CdS).
    Verificare data di entrata in vigore con superiore.
  federal: "RS 642.118.1 — Ordinanza DFF sulle deduzioni delle spese professionali (stato 2026)"
  federal_act: "Art. 26 LIFD (RS 642.11)"

# ─── CANTON TICINO (Art. 25 LT) ──────────────────────────────────────────────
cantonal_TI:
  transport:
    public_transport:
      mode: actual_cost            # spesa effettiva documentata (abbonamento, biglietti)
      cap_chf: null                # nessun tetto massimo cantonale

    private_car:
      rate_chf_per_km: 0.75       # STIMA 2026 — allineato a IFD. DA CONFERMARE con Decreto CdS TI 2026
      condition: no_adequate_public_transport
      cap_chf: null                # nessun tetto cantonale

    bicycle:
      flat_rate_chf_per_year: 700  # forfait annuale bicicletta / e-bike / ciclomotore

    motorcycle_white_plate:
      rate_chf_per_km: 0.40        # motocicletta targa bianca (allineato a IFD RS 642.118.1 Appendice)

  meals:
    # Art. 25 cpv. 1 lett. b LT — allineato a IFD (Appendice RS 642.118.1)
    without_cafeteria:
      rate_chf_per_day: 15.00        # doppia economia domestica, 1 pasto
      annual_max_chf: 3200
    with_cafeteria:
      rate_chf_per_day: 7.50         # con mensa / contributo datore di lavoro, 1 pasto
      annual_max_chf: 1600
    shift_work:
      rate_chf_per_day: 15.00        # lavori a turni — stessa tariffa senza mensa
      annual_max_chf: 3200           # per analogia con 2025 (Tabella_deduzioni_PF_2025.pdf sez. 9)
    weekly_resident:
      rate_chf_per_day: 30.00        # rientro settimanale, 2 pasti
      annual_max_chf: 6400
    weekly_resident_with_cafeteria:
      rate_chf_per_day: 22.50        # rientro settimanale con mensa, 2 pasti
      annual_max_chf: 4800
    weekly_resident_accommodation:
      mode: actual_cost
      without_kitchen_cap_monthly_chf: 800
      with_kitchen_cap_monthly_chf: 1000
    weekly_resident_with_kitchen:
      rate_chf_per_day: 15.00
      annual_max_chf: 3200
    weekly_resident_with_kitchen_cafeteria:
      rate_chf_per_day: 7.50
      annual_max_chf: 1600

  other_expenses:
    method: flat_rate
    flat_rate_chf: 3000              # STIMA 2026 — DA CONFERMARE con Decreto CdS TI 2026
    flat_rate_part_time_chf: 1500   # lavoro <50% o <6 mesi/anno (per analogia con 2025)
    secondary_activity:              # spese per attività accessoria dipendente
      flat_rate_chf: 800             # per analogia con 2025 (Tabella_deduzioni_PF_2025.pdf sez. 9)
      method: flat_rate_or_actual    # 800 CHF o spese effettive se superiori

  public_transport_subscriptions:   # FONTE: flyer ARCOBALENO "Piano zone e tariffe", dicembre 2025, valido dal 14.12.2025
    arcobaleno_annual_adult_2cl:    # Adulti >=25 anni, 2a classe
      zones_1: 485
      zones_2: 732
      zones_3: 1074
      zones_4: 1387
      zones_5: 1691
      zones_6: 1986
      zones_7: 2157
      zones_8_plus: 2252
    arcobaleno_annual_adult_1cl:    # Adulti >=25 anni, 1a classe
      zones_1: 827
      zones_2: 1245
      zones_3: 1834
      zones_4: 2366
      zones_5: 2879
      zones_6: 3382
      zones_7: 3667
      zones_8_plus: 3829

  # Forfait globale Art. 25 cpv. 2 LT (ALTERNATIVA alle spese singole)
  # Votato da Parlamento TI il 10.06.2026 (52 sì, 14 no) — VERIFICARE entrata in vigore
  flat_rate_all_expenses_chf: 3500

# ─── IMPOSTA FEDERALE DIRETTA (Art. 26 LIFD) ─────────────────────────────────
federal_IFD:
  transport:
    public_transport:
      mode: actual_cost
      cap_chf: null

    private_car:
      rate_chf_per_km: 0.75        # CONFERMATO: RS 642.118.1 Appendice, aggiornato RU 2025 578 (valido dal 1.1.2026)
      cap_chf: 3300                # tetto massimo IFD 2026 (RS 642.118.1 Art. 5 cpv. 1)

    bicycle:
      flat_rate_chf_per_year: 700  # bicicletta, ciclomotore, moto targa gialla (Appendice RS 642.118.1)

    motorcycle_white_plate:
      rate_chf_per_km: 0.40        # motocicletta con targa bianca (Appendice RS 642.118.1)

  meals:
    without_cafeteria:
      rate_chf_per_day: 15.00        # doppia economia domestica, 1 pasto
      annual_max_chf: 3200
    with_cafeteria:
      rate_chf_per_day: 7.50         # con mensa / contributo datore di lavoro, 1 pasto
      annual_max_chf: 1600
    shift_work:
      rate_chf_per_day: 15.00        # lavori a turni — stessa tariffa senza mensa
      annual_max_chf: 3200           # per analogia con 2025 (Tabella_deduzioni_PF_2025.pdf sez. 9)
    weekly_resident:
      rate_chf_per_day: 30.00        # rientro settimanale, 2 pasti
      annual_max_chf: 6400
    weekly_resident_with_cafeteria:
      rate_chf_per_day: 22.50        # rientro settimanale con mensa, 2 pasti
      annual_max_chf: 4800
    weekly_resident_accommodation:
      mode: actual_cost
      without_kitchen_cap_monthly_chf: 800
      with_kitchen_cap_monthly_chf: 1000
    weekly_resident_with_kitchen:
      rate_chf_per_day: 15.00
      annual_max_chf: 3200
    weekly_resident_with_kitchen_cafeteria:
      rate_chf_per_day: 7.50
      annual_max_chf: 1600

  other_expenses:
    method: percentage_of_net_salary
    rate_percent: 3.0                # confermato RS 642.118.1
    minimum_chf: 2000
    maximum_chf: 4000
    part_time:                       # lavoro <50% o <6 mesi/anno — stessa formula (min/max invariati)
      rate_percent: 3.0
      minimum_chf: 2000
      maximum_chf: 4000
    secondary_activity:              # spese per attività accessoria dipendente
      method: percentage_of_net_salary
      rate_percent: 20.0
      minimum_chf: 800
      maximum_chf: 2400

# ─── GIORNI LAVORATIVI ───────────────────────────────────────────────────────
working_days:
  standard_annual: 220             # giorni lavorativi standard per anno
  # Il servizio calcola: giorni_effettivi = standard_annual - giorni_home_office

# ─── PARAMETRI GEOCODING ─────────────────────────────────────────────────────
geocoding:
  road_correction_factor: 1.25    # fattore correzione haversine → distanza stradale
